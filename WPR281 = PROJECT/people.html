<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>People</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="list.css">
</head>
<body>
    <nav class="navbar shadow-sm">
        <div class="container dashboard-shell">
            <a class="navbar-brand fw-bold" href="dashboard.html">🐞 Bug Tracker</a>

            <div class="navbar-nav ms-auto d-flex flex-row gap-3 align-items-center">
                <a class="nav-link" href="dashboard.html">Dashboard</a>
                <a class="nav-link" href="create.html">Create Issue</a>
                <a class="nav-link active" href="people.html">People</a>
                <a class="nav-link" href="projects.html">Projects</a>
                <a class="nav-link logout-link" href="javascript:void(0)" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="mb-4">People</h2>

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <h5 class="mb-3">Add Person</h5>
                <form id="personForm" class="row g-3">
                    <div class="col-md-2">
                        <input type="text" id="personName" class="form-control" placeholder="Name" required>
                    </div>
                    <div class="col-md-2">
                        <input type="text" id="personSurname" class="form-control" placeholder="Surname" required>
                    </div>
                    <div class="col-md-3">
                        <input type="email" id="personEmail" class="form-control" placeholder="Email" required>
                    </div>
                    <div class="col-md-3">
                        <input type="text" id="personUsername" class="form-control" placeholder="Username" required>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Add Person</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Surname</th>
                            <th>Email</th>
                            <th>Username</th>
                            <th>Assigned Issues</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="peopleTableBody">
                        <tr>
                            <td colspan="7" class="text-muted">People will be loaded here</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="storage.js"></script>
    <script src="authentication.js"></script>
    <script src="people.js"></script>
</body>
</html>
