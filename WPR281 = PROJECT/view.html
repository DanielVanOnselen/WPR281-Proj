<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>View Issue</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="view.css" />
</head>
<body>
    <nav class="navbar shadow-sm">
        <div class="container dashboard-shell">
            <a class="navbar-brand fw-bold" href="dashboard.html">🐞 Bug Tracker</a>

            <div class="navbar-nav ms-auto d-flex flex-row gap-3 align-items-center">
                <a class="nav-link" href="dashboard.html">Dashboard</a>
                <a class="nav-link" href="create.html">Create Issue</a>
                <a class="nav-link" href="people.html">People</a>
                <a class="nav-link" href="projects.html">Projects</a>
                <a class="nav-link logout-link" href="javascript:void(0)" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="card shadow-sm border-0 issue-card">
            <div class="card-header bg-white">
                <h3 class="mb-0">Issue Details</h3>
            </div>
            <div class="card-body">
                <div class="row g-4">
                    <div class="col-md-6">
                        <p><strong>Summary:</strong> <span id="issue-summary">--</span></p>
                        <p><strong>Detailed Description:</strong> <span id="issue-description">--</span></p>
                        <p><strong>Identified By:</strong> <span id="issue-identifiedBy">--</span></p>
                        <p><strong>Date Identified:</strong> <span id="issue-identifiedDate">--</span></p>
                        <p><strong>Project:</strong> <span id="issue-project">--</span></p>
                    </div>

                    <div class="col-md-6">
                        <p><strong>Assigned To:</strong> <span id="issue-assignedTo">--</span></p>
                        <p><strong>Status:</strong> <span id="issue-status">--</span></p>
                        <p><strong>Priority:</strong> <span id="issue-priority">--</span></p>
                        <p><strong>Target Resolution Date:</strong> <span id="issue-targetDate">--</span></p>
                        <p><strong>Actual Resolution Date:</strong> <span id="issue-actualResolutionDate">--</span></p>
                        <p><strong>Resolution Summary:</strong> <span id="issue-resolutionSummary">--</span></p>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <a href="dashboard.html" class="btn btn-secondary">Back</a>
                    <button class="btn btn-primary" onclick="goToEditIssue()">Edit Issue</button>
                    <button class="btn btn-danger" onclick="deleteCurrentIssue()">Delete Issue</button>
                </div>
            </div>
        </div>
    </div>

    <script src="storage.js"></script>
    <script src="authentication.js"></script>
    <script src="view.js"></script>
</body>
</html>
