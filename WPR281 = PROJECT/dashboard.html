<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Tracking Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
<nav class="navbar shadow-sm">
    <div class="container dashboard-shell">
        <a class="navbar-brand fw-bold" href="dashboard.html">🐞 Bug Tracker</a>

        <div class="navbar-nav ms-auto d-flex flex-row gap-3 align-items-center">
            <a class="nav-link active" href="dashboard.html">Dashboard</a>
            <a class="nav-link" href="create.html">Create Issue</a>
            <a class="nav-link" href="people.html">People</a>
            <a class="nav-link" href="projects.html">Projects</a>
            <a class="nav-link logout-link" href="javascript:void(0)" onclick="logout()">Logout</a>
        </div>
    </div>
</nav>

    <div class="container py-4">
        <div class="dashboard-shell dashboard-panel p-4">
            <header class="text-center mb-4">
                <h2 class="page-title">Bug Tracking Dashboard</h2>
                <p class="page-subtitle mb-0">View all issues by status</p>
            </header>

            <div class="row g-3 justify-content-center">
                <div class="col-12 col-lg-4">
                    <div class="status-column">
                        <h6 class="fw-bold mb-3">Open</h6>
                        <button class="btn btn-add-task w-100 mb-3" onclick="goToCreateIssue()">+ Create New Issue</button>
                        <div id="open-column"></div>
                    </div>
                </div>

                <div class="col-12 col-lg-4">
                    <div class="status-column">
                        <h6 class="fw-bold mb-3">Resolved</h6>
                        <button class="btn btn-add-task w-100 mb-3" onclick="goToCreateIssue()">+ Create New Issue</button>
                        <div id="resolved-column"></div>
                    </div>
                </div>

                <div class="col-12 col-lg-4">
                    <div class="status-column">
                        <h6 class="fw-bold mb-3">Overdue</h6>
                        <button class="btn btn-add-task w-100 mb-3" onclick="goToCreateIssue()">+ Create New Issue</button>
                        <div id="overdue-column"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="dateEditModal" tabindex="-1" aria-labelledby="dateEditModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="dateEditModalLabel">Update Issue Dates</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <input type="hidden" id="modalIssueId">

                <div class="mb-3">
                    <label for="modalTargetDate" class="form-label">Target Resolution Date</label>
                    <input type="date" id="modalTargetDate" class="form-control">
                </div>

                <div class="mb-3">
                    <label for="modalActualResolutionDate" class="form-label">Actual Resolution Date</label>
                    <input type="date" id="modalActualResolutionDate" class="form-control">
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveIssueDates()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="storage.js"></script>
<script src="authentication.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
